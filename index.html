<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JUMP大赛 BP系统 [联网版]</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#12082e;color:#fff;min-height:100vh}
.conn-bar{text-align:center;font-size:10px;padding:3px;background:rgba(0,0,0,.3)}
.conn-bar.online{color:#4ade80}.conn-bar.offline{color:#f87171}.conn-bar.waiting{color:#fcd34d}
.header{text-align:center;padding:10px 16px 6px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.1)}
.header h1{font-size:17px;font-weight:700;letter-spacing:2px;background:linear-gradient(90deg,#e8b4ff,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .code{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px}
.ref-bar{display:flex;gap:5px;justify-content:center;margin-top:5px;flex-wrap:wrap}
.ref-bar button{padding:4px 10px;font-size:11px;font-weight:700;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:5px;color:#fcd34d;cursor:pointer;font-family:inherit}
.ref-bar button:hover{background:rgba(255,210,60,.2)}
.ref-bar .danger{color:#f87171;border-color:rgba(248,113,113,.4)}
.ref-bar .danger:hover{background:rgba(248,113,113,.15)}
.ref-bar .green{color:#4ade80;border-color:rgba(74,222,128,.4)}
.ref-bar .green:hover{background:rgba(74,222,128,.15)}
.ref-bar .swap{color:#c4b5fd;border-color:rgba(196,181,253,.4)}
.ref-bar .swap:hover{background:rgba(196,181,253,.15)}
.my-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;margin-left:4px;-webkit-text-fill-color:initial}
.my-badge.a{background:rgba(220,50,50,.45);color:#fca5a5}
.my-badge.b{background:rgba(50,100,220,.45);color:#93c5fd}
.my-badge.ref{background:rgba(167,139,250,.35);color:#e9d5ff}
.round-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(255,210,60,.2);color:#fcd34d;margin-left:4px;-webkit-text-fill-color:initial}

/* 添加JUMP/Sunday标识样式 */
.jump-sunday-indicators {
  display: flex;
  justify-content: space-around;
  gap: 10px;
  margin-top: 5px;
  padding: 5px 10px;
  background: rgba(0,0,0,.2);
  border-radius: 6px;
  font-size: 11px;
}
.jump-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(248, 113, 113, 0.2);
  color: #fca5a5;
  border: 1px solid rgba(248, 113, 113, 0.3);
}
.sunday-indicator {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 3px 8px;
  border-radius: 5px;
  background: rgba(74, 222, 128, 0.2);
  color: #4ade80;
  border: 1px solid rgba(74, 222, 128, 0.3);
}

.main{display:flex;flex-direction:column;height:calc(100vh - 120px);max-width:800px;margin:0 auto;padding:10px;gap:10px}
.side{display:flex;flex-direction:column;flex:1;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:10px}
.side-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1)}
.side-title{font-size:14px;font-weight:700;color:#f0f0f0}
.status-indicator{font-size:11px;padding:2px 8px;border-radius:4px}
.status-picking{background:rgba(255,210,60,.2);color:#fcd34d}
.status-banned{background:rgba(248,113,113,.2);color:#fca5a5}
.status-ready{background:rgba(74,222,128,.2);color:#4ade80}
.picks-container{display:flex;flex-direction:column;gap:5px;flex:1;overflow-y:auto;max-height:150px}
.pick-item{display:flex;align-items:center;justify-content:space-between;padding:4px 6px;background:rgba(255,255,255,.05);border-radius:4px;font-size:12px}
.pick-hero{font-weight:700;color:#f0f0f0}
.pick-type{font-size:10px;color:rgba(255,255,255,.6)}
.actions{display:flex;gap:5px;margin-top:10px}
.action-btn{flex:1;padding:8px;font-size:12px;font-weight:700;border:none;border-radius:5px;cursor:pointer;font-family:inherit}
.action-btn.pick{background:rgba(74,222,128,.2);color:#4ade80}
.action-btn.pick:hover{background:rgba(74,222,128,.3)}
.action-btn.ban{background:rgba(248,113,113,.2);color:#fca5a5}
.action-btn.ban:hover{background:rgba(248,113,113,.3)}
.action-btn.locked{background:rgba(100,100,100,.2);color:rgba(255,255,255,.5);cursor:not-allowed}
.chat{margin-top:10px;padding:10px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:8px;max-height:150px;overflow-y:auto}
.chat-messages{height:100px;overflow-y:auto;margin-bottom:8px;font-size:12px;line-height:1.4}
.message{margin-bottom:4px}
.message-time{color:rgba(255,255,255,.5);font-size:10px;margin-right:5px}
.message-user{font-weight:700;margin-right:5px}
.message-text{word-break:break-word}
.chat-input{display:flex;gap:5px}
.chat-input input{flex:1;padding:6px 8px;font-size:12px;border:1px solid rgba(255,255,255,.2);border-radius:4px;background:rgba(0,0,0,.3);color:#fff;font-family:inherit}
.chat-input button{padding:6px 10px;font-size:12px;font-weight:700;background:rgba(167,139,250,.3);color:#e9d5ff;border:1px solid rgba(167,139,250,.4);border-radius:4px;cursor:pointer;font-family:inherit}
.chat-input button:hover{background:rgba(167,139,250,.4)}

.history{margin-top:10px;padding:10px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:8px}
.history h3{font-size:14px;font-weight:700;margin-bottom:8px;color:#f0f0f0}
.history-items{max-height:200px;overflow-y:auto}
.history-item{margin-bottom:5px;padding:5px;background:rgba(255,255,255,.05);border-radius:4px;font-size:12px}
.history-round{font-weight:700;margin-bottom:3px;color:#f0f0f0}
.history-pick{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px dashed rgba(255,255,255,.1)}
.history-pick:last-child{border-bottom:none}

.login-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-form{background:#1e1b4b;padding:20px;border-radius:10px;min-width:300px}
.login-form h2{font-size:18px;margin-bottom:15px;text-align:center;color:#e0e7ff}
.login-form .form-group{margin-bottom:15px}
.login-form label{display:block;margin-bottom:5px;font-size:14px;color:#cbd5e1}
.login-form input{width:100%;padding:10px;font-size:16px;border:1px solid #4c1d95;border-radius:5px;background:#1e1b2e;color:#fff;font-family:inherit}
.login-form .error-message{color:#f87171;font-size:12px;margin-top:5px;display:none}
.login-form button{width:100%;padding:12px;font-size:16px;font-weight:700;background:#7e22ce;color:white;border:none;border-radius:5px;cursor:pointer;font-family:inherit}
.login-form button:hover{background:#6d28d9}
.login-form .login-ref-section{margin-top:15px;padding-top:15px;border-top:1px solid rgba(255,255,255,.2)}
.login-form .ref-password-input{margin-top:8px}

@media (max-width:600px){
  .main{height:calc(100vh - 140px)}
  .header h1{font-size:15px}
  .side{padding:8px}
  .side-title{font-size:13px}
  .pick-item{font-size:11px}
  .action-btn{padding:6px;font-size:11px}
  .chat-messages{height:80px}
  .history-items{max-height:150px}
}
</style>
</head>
<body>
<div class="conn-bar offline" id="connStatus">连接中...</div>
<div class="header">
  <h1>JUMP大赛 BP系统 [联网版]</h1>
  <div class="code">房间号: <span id="roomIdDisplay">-</span></div>
  <div class="jump-sunday-indicators">
    <div class="jump-indicator">
      <span>Jump方</span>
    </div>
    <div class="sunday-indicator">
      <span>Sunday方</span>
    </div>
  </div>
  <div class="ref-bar">
    <button id="toggleRefBtn" class="green" style="display:none;">申请裁判权限</button>
    <button id="resetBtn" class="danger">重置对局</button>
    <button id="swapSidesBtn" class="swap">换边</button>
  </div>
</div>
<div class="main">
  <div class="side" id="sideA">
    <div class="side-header">
      <div class="side-title">A队 <span class="my-badge a" id="teamAIndicator">A</span></div>
      <div class="status-indicator status-ready" id="statusA">准备就绪</div>
    </div>
    <div class="picks-container" id="picksA"></div>
    <div class="actions">
      <button class="action-btn pick locked" id="pickBtnA">选择英雄</button>
      <button class="action-btn ban locked" id="banBtnA">禁用英雄</button>
    </div>
  </div>
  <div class="side" id="sideB">
    <div class="side-header">
      <div class="side-title">B队 <span class="my-badge b" id="teamBIndicator">B</span></div>
      <div class="status-indicator status-ready" id="statusB">准备就绪</div>
    </div>
    <div class="picks-container" id="picksB"></div>
    <div class="actions">
      <button class="action-btn pick locked" id="pickBtnB">选择英雄</button>
      <button class="action-btn ban locked" id="banBtnB">禁用英雄</button>
    </div>
  </div>
</div>
<div class="chat">
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input">
    <input type="text" id="chatInput" placeholder="输入聊天消息..." maxlength="200"/>
    <button id="sendChatBtn">发送</button>
  </div>
</div>
<div class="history">
  <h3>BP历史记录</h3>
  <div class="history-items" id="historyItems"></div>
</div>

<!-- 登录模态框 -->
<div class="login-modal" id="loginModal" style="display:flex;">
  <div class="login-form">
    <h2>用户登录</h2>
    <div class="form-group">
      <label for="usernameInput">用户名</label>
      <input type="text" id="usernameInput" placeholder="请输入用户名" maxlength="20"/>
    </div>
    <div class="form-group">
      <label>身份</label>
      <select id="roleSelect" style="width:100%;padding:10px;font-size:16px;border:1px solid #4c1d95;border-radius:5px;background:#1e1b2e;color:#fff;font-family:inherit;">
        <option value="player_a">A队选手</option>
        <option value="player_b">B队选手</option>
        <option value="referee">裁判</option>
      </select>
    </div>
    <div class="form-group" id="refPasswordSection" style="display:none;">
      <label for="refPasswordInput">裁判码</label>
      <input type="password" id="refPasswordInput" placeholder="请输入裁判码" maxlength="20"/>
      <div class="error-message" id="refPasswordError">裁判码错误</div>
    </div>
    <button id="loginBtn">登录</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
// 默认裁判码
const DEFAULT_REF_PASSWORD = '759315';

// 隐藏登录模态框的函数
function hideLoginModal() {
  document.getElementById('loginModal').style.display = 'none';
}

// 显示登录模态框的函数
function showLoginModal() {
  document.getElementById('loginModal').style.display = 'flex';
}

// 更新JUMP/Sunday指示器
function updateJumpSundayIndicators() {
  const jumpIndicator = document.querySelector('.jump-indicator');
  const sundayIndicator = document.querySelector('.sunday-indicator');
  
  // 根据当前换边状态决定显示内容
  if (currentSwapCount % 2 === 0) {
    // 未换边时，A队是JUMP，B队是SUNDAY
    jumpIndicator.innerHTML = '<span>Jump方</span><span class="my-badge a">A队</span>';
    sundayIndicator.innerHTML = '<span>Sunday方</span><span class="my-badge b">B队</span>';
  } else {
    // 换边后，A队是SUNDAY，B队是JUMP
    jumpIndicator.innerHTML = '<span>Jump方</span><span class="my-badge b">B队</span>';
    sundayIndicator.innerHTML = '<span>Sunday方</span><span class="my-badge a">A队</span>';
  }
}

// 初始隐藏登录模态框
document.addEventListener('DOMContentLoaded', function() {
  // 初始化JUMP/Sunday指示器
  updateJumpSundayIndicators();
  
  // 监听身份选择变化
  document.getElementById('roleSelect').addEventListener('change', function() {
    const role = this.value;
    const refSection = document.getElementById('refPasswordSection');
    const refError = document.getElementById('refPasswordError');
    
    if (role === 'referee') {
      refSection.style.display = 'block';
      refError.style.display = 'none';
    } else {
      refSection.style.display = 'none';
    }
  });
  
  // 登录按钮事件
  document.getElementById('loginBtn').addEventListener('click', function() {
    const username = document.getElementById('usernameInput').value.trim();
    const role = document.getElementById('roleSelect').value;
    const refPasswordInput = document.getElementById('refPasswordInput');
    const refPassword = refPasswordInput ? refPasswordInput.value.trim() : '';
    const refPasswordError = document.getElementById('refPasswordError');
    
    if (!username) {
      alert('请输入用户名');
      return;
    }
    
    if (role === 'referee') {
      if (!refPassword) {
        alert('请输入裁判码');
        return;
      }
      
      if (refPassword !== DEFAULT_REF_PASSWORD) {
        refPasswordError.style.display = 'block';
        return;
      } else {
        refPasswordError.style.display = 'none';
      }
    } else {
      // 对于A队或B队，隐藏申请裁判按钮
      document.getElementById('toggleRefBtn').style.display = 'none';
    }
    
    // 发送登录请求
    socket.emit('login', { username, role });
  });
});

// 全局变量
let socket;
let currentRole = null;
let currentUsername = null;
let currentSwapCount = 0; // 记录换边次数
let roundHistory = []; // 存储每轮的历史记录

// 连接到服务器
socket = io();

socket.on('connect', function() {
  document.getElementById('connStatus').className = 'conn-bar online';
  document.getElementById('connStatus').textContent = '在线';
});

socket.on('disconnect', function() {
  document.getElementById('connStatus').className = 'conn-bar offline';
  document.getElementById('connStatus').textContent = '离线';
  showLoginModal();
});

socket.on('reconnecting', function() {
  document.getElementById('connStatus').className = 'conn-bar waiting';
  document.getElementById('connStatus').textContent = '重连中...';
});

socket.on('room_info', function(data) {
  document.getElementById('roomIdDisplay').textContent = data.roomId;
});

socket.on('login_success', function(data) {
  currentRole = data.role;
  currentUsername = data.username;
  currentSwapCount = data.swapCount || 0;
  roundHistory = data.roundHistory || [];
  
  // 更新JUMP/Sunday指示器
  updateJumpSundayIndicators();
  
  // 更新界面元素
  if (currentRole === 'referee') {
    document.getElementById('toggleRefBtn').style.display = 'inline-block';
  } else {
    document.getElementById('toggleRefBtn').style.display = 'none';
  }
  
  hideLoginModal();
  updateUI(data.state);
});

socket.on('login_failed', function(data) {
  alert(data.message);
});

socket.on('state_update', function(data) {
  currentSwapCount = data.swapCount || 0;
  roundHistory = data.roundHistory || [];
  
  // 更新JUMP/Sunday指示器
  updateJumpSundayIndicators();
  
  updateUI(data);
});

socket.on('chat_message', function(data) {
  addChatMessage(data);
});

socket.on('round_history_update', function(data) {
  roundHistory = data.roundHistory || [];
  updateHistoryDisplay();
});

function updateUI(state) {
  // 更新队伍名称和状态
  document.getElementById('teamAIndicator').textContent = state.teamA.name || 'A';
  document.getElementById('teamBIndicator').textContent = state.teamB.name || 'B';
  
  // 更新状态指示器
  updateStatusIndicator('A', state.teamA.status);
  updateStatusIndicator('B', state.teamB.status);
  
  // 清空现有选择和禁用列表
  document.getElementById('picksA').innerHTML = '';
  document.getElementById('picksB').innerHTML = '';
  
  // 填充A队的选择和禁用
  state.teamA.picks.forEach(pick => {
    addPickToContainer('A', pick.hero, pick.type);
  });
  state.teamA.bans.forEach(ban => {
    addBanToContainer('A', ban);
  });
  
  // 填充B队的选择和禁用
  state.teamB.picks.forEach(pick => {
    addPickToContainer('B', pick.hero, pick.type);
  });
  state.teamB.bans.forEach(ban => {
    addBanToContainer('B', ban);
  });
  
  // 更新按钮状态
  updateButtonState('A', state.teamA.canAct, state.teamA.currentAction);
  updateButtonState('B', state.teamB.canAct, state.teamB.currentAction);
  
  // 更新历史记录
  updateHistoryDisplay();
}

function updateStatusIndicator(side, status) {
  const statusElement = document.getElementById(`status${side}`);
  statusElement.className = 'status-indicator';
  switch(status) {
    case 'picking':
      statusElement.classList.add('status-picking');
      statusElement.textContent = '正在选择';
      break;
    case 'banning':
      statusElement.classList.add('status-banned');
      statusElement.textContent = '正在禁用';
      break;
    case 'ready':
    default:
      statusElement.classList.add('status-ready');
      statusElement.textContent = '准备就绪';
      break;
  }
}

function addPickToContainer(side, hero, type) {
  const container = document.getElementById(`picks${side}`);
  const div = document.createElement('div');
  div.className = 'pick-item';
  div.innerHTML = `
    <span class="pick-hero">${hero}</span>
    <span class="pick-type">${type === 'pick' ? '选择' : '禁用'}</span>
  `;
  container.appendChild(div);
}

function addBanToContainer(side, hero) {
  const container = document.getElementById(`picks${side}`);
  const div = document.createElement('div');
  div.className = 'pick-item';
  div.innerHTML = `
    <span class="pick-hero">${hero} (禁用)</span>
    <span class="pick-type">BAN</span>
  `;
  container.appendChild(div);
}

function updateButtonState(side, canAct, currentAction) {
  const pickBtn = document.getElementById(`pickBtn${side}`);
  const banBtn = document.getElementById(`banBtn${side}`);
  
  if (canAct) {
    pickBtn.disabled = false;
    banBtn.disabled = false;
    pickBtn.classList.remove('locked');
    banBtn.classList.remove('locked');
    
    if (currentAction === 'pick') {
      pickBtn.classList.add('active');
      banBtn.classList.remove('active');
    } else if (currentAction === 'ban') {
      banBtn.classList.add('active');
      pickBtn.classList.remove('active');
    }
  } else {
    pickBtn.disabled = true;
    banBtn.disabled = true;
    pickBtn.classList.add('locked');
    banBtn.classList.add('locked');
  }
}

function updateHistoryDisplay() {
  const historyContainer = document.getElementById('historyItems');
  historyContainer.innerHTML = '';
  
  if (!roundHistory || roundHistory.length === 0) {
    historyContainer.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,.5);font-size:12px;">暂无历史记录</div>';
    return;
  }
  
  // 按轮次显示历史记录
  roundHistory.forEach((round, index) => {
    const roundDiv = document.createElement('div');
    roundDiv.className = 'history-item';
    
    const roundHeader = document.createElement('div');
    roundHeader.className = 'history-round';
    roundHeader.textContent = `第 ${index + 1} 轮`;
    roundDiv.appendChild(roundHeader);
    
    // 显示该轮的BP记录
    if (round.actions && round.actions.length > 0) {
      round.actions.forEach(action => {
        const actionDiv = document.createElement('div');
        actionDiv.className = 'history-pick';
        
        // 根据换边次数确定实际的队伍身份
        let teamName, teamColor;
        if (currentSwapCount % 2 === 0) {
          // 未换边：A队是JUMP，B队是SUNDAY
          if (action.team === 'A') {
            teamName = 'JUMP';
            teamColor = '#fca5a5';
          } else {
            teamName = 'SUNDAY';
            teamColor = '#4ade80';
          }
        } else {
          // 换边：A队是SUNDAY，B队是JUMP
          if (action.team === 'A') {
            teamName = 'SUNDAY';
            teamColor = '#4ade80';
          } else {
            teamName = 'JUMP';
            teamColor = '#fca5a5';
          }
        }
        
        actionDiv.innerHTML = `
          <span style="color:${teamColor}">${teamName} (${action.team})</span>
          <span>${action.type === 'pick' ? '选择' : '禁用'}: ${action.hero}</span>
        `;
        roundDiv.appendChild(actionDiv);
      });
    } else {
      const noActions = document.createElement('div');
      noActions.style.color = 'rgba(255,255,255,.5)';
      noActions.style.fontSize = '11px';
      noActions.textContent = '暂无操作';
      roundDiv.appendChild(noActions);
    }
    
    historyContainer.appendChild(roundDiv);
  });
}

function addChatMessage(data) {
  const chatContainer = document.getElementById('chatMessages');
  const messageDiv = document.createElement('div');
  messageDiv.className = 'message';
  
  const time = new Date(data.timestamp).toLocaleTimeString();
  let userBadge = '';
  if (data.role === 'referee') {
    userBadge = `<span class="my-badge ref">${data.username}</span>`;
  } else if (data.role === 'player_a') {
    userBadge = `<span class="my-badge a">${data.username}</span>`;
  } else if (data.role === 'player_b') {
    userBadge = `<span class="my-badge b">${data.username}</span>`;
  } else {
    userBadge = data.username;
  }
  
  messageDiv.innerHTML = `
    <span class="message-time">${time}</span>
    <span class="message-user">${userBadge}</span>
    <span class="message-text">${data.message}</span>
  `;
  
  chatContainer.appendChild(messageDiv);
  chatContainer.scrollTop = chatContainer.scrollHeight;
}

// 事件监听器
document.getElementById('pickBtnA').addEventListener('click', function() {
  socket.emit('perform_action', { team: 'A', action: 'pick' });
});

document.getElementById('banBtnA').addEventListener('click', function() {
  socket.emit('perform_action', { team: 'A', action: 'ban' });
});

document.getElementById('pickBtnB').addEventListener('click', function() {
  socket.emit('perform_action', { team: 'B', action: 'pick' });
});

document.getElementById('banBtnB').addEventListener('click', function() {
  socket.emit('perform_action', { team: 'B', action: 'ban' });
});

document.getElementById('sendChatBtn').addEventListener('click', function() {
  const input = document.getElementById('chatInput');
  const message = input.value.trim();
  if (message) {
    socket.emit('chat_message', { message });
    input.value = '';
  }
});

document.getElementById('chatInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') {
    document.getElementById('sendChatBtn').click();
  }
});

document.getElementById('resetBtn').addEventListener('click', function() {
  if (confirm('确定要重置对局吗？此操作不可撤销。')) {
    socket.emit('reset_game');
  }
});

document.getElementById('swapSidesBtn').addEventListener('click', function() {
  socket.emit('swap_sides');
});

// 申请裁判权限按钮（仅裁判可见）
document.getElementById('toggleRefBtn').addEventListener('click', function() {
  // 由于规则改变，这里不再允许非裁判用户获取裁判权限
  // 此按钮只在用户本身就是裁判时才会显示
  alert('您已经是裁判，无需申请权限。');
});
</script>
