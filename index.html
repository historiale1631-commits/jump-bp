<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>JUMP大赛 BP系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#12082e;color:#fff;min-height:100vh}

/* ── Header ── */
.header{text-align:center;padding:14px 16px 10px;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(255,255,255,.1)}
.header h1{font-size:20px;font-weight:700;letter-spacing:3px;background:linear-gradient(90deg,#e8b4ff,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header .code{font-size:12px;color:rgba(255,255,255,.45);margin-top:3px}

/* ── Layout ── */
.layout{display:flex;height:calc(100vh - 54px);overflow:hidden}

/* ── Side panels ── */
.side{width:190px;flex-shrink:0;display:flex;flex-direction:column;padding:10px 7px;gap:4px;overflow-y:auto;background:rgba(0,0,0,.3)}
.side.a-side{border-right:1px solid rgba(255,255,255,.08)}
.side.b-side{border-left:1px solid rgba(255,255,255,.08)}
.side::-webkit-scrollbar{width:3px}
.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

.side-label{text-align:center;font-size:11px;font-weight:700;padding:5px;border-radius:5px;letter-spacing:2px;margin-bottom:2px}
.side-label.a{background:rgba(220,50,50,.35);color:#fca5a5}
.side-label.b{background:rgba(50,100,220,.35);color:#93c5fd}

.score-total{text-align:center;font-size:13px;font-weight:700;padding:6px 4px;border-radius:6px;margin-bottom:4px}
.score-total.a{background:rgba(220,50,50,.2);color:#fca5a5;border:1px solid rgba(220,50,50,.3)}
.score-total.b{background:rgba(50,100,220,.2);color:#93c5fd;border:1px solid rgba(50,100,220,.3)}
.score-over{color:#f87171!important;border-color:#f87171!important}

.sec-label{font-size:9px;color:rgba(255,255,255,.3);padding:2px 4px;margin-top:3px}

.pick-slot{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);min-height:40px;transition:all .15s;cursor:default}
.pick-slot.active{border-color:rgba(255,210,60,.85);background:rgba(255,210,60,.1);box-shadow:0 0 8px rgba(255,210,60,.2)}
.pick-slot.filled{background:rgba(60,180,100,.1);border-color:rgba(60,180,100,.3)}
.pick-slot .av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.pick-slot .info{flex:1;min-width:0}
.pick-slot .pname{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick-slot .pscore{font-size:10px;color:rgba(255,255,255,.5)}
.pick-slot .type-badge{font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.badge-str{background:rgba(220,80,80,.35);color:#fca5a5}
.badge-agi{background:rgba(80,180,80,.35);color:#86efac}
.badge-int{background:rgba(80,130,220,.35);color:#93c5fd}

/* ── Center ── */
.center{flex:1;display:flex;flex-direction:column;padding:10px 14px;gap:8px;min-width:0;overflow-y:auto}
.center::-webkit-scrollbar{width:3px}
.center::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

.info-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(255,255,255,.07);border-radius:8px;border:1px solid rgba(255,255,255,.1);font-size:12px;flex-wrap:wrap}
.info-bar .iname{font-weight:600;font-size:13px}
.team-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.team-tag.a{background:rgba(220,50,50,.45);color:#fca5a5}
.team-tag.b{background:rgba(50,100,220,.45);color:#93c5fd}

.phase-row{display:flex;gap:6px;align-items:center}
.phase-bar{flex:1;padding:7px 12px;background:rgba(255,255,255,.05);border-radius:7px;border:1px solid rgba(255,255,255,.08);text-align:center;font-size:12px;color:rgba(255,255,255,.6)}
.status-bar{padding:9px 12px;background:rgba(0,0,0,.3);border-radius:7px;text-align:center;font-size:12px;color:rgba(255,255,255,.8)}

.timer-bar{padding:12px;background:rgba(0,0,0,.4);border-radius:8px;text-align:center;font-size:26px;font-weight:700;color:#fcd34d;transition:color .3s}
.timer-bar.urgent{color:#f87171;animation:pulse .5s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.6}}

/* ── Tabs ── */
.tab-row{display:flex;gap:4px}
.tab-btn{flex:1;padding:7px 4px;border:1px solid rgba(255,255,255,.12);border-radius:6px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.tab-btn.active{background:rgba(167,139,250,.2);border-color:rgba(167,139,250,.5);color:#e9d5ff;font-weight:600}
.tab-btn:hover:not(.active){background:rgba(255,255,255,.1)}

.tab-str.active{background:rgba(220,80,80,.2);border-color:rgba(220,80,80,.5);color:#fca5a5}
.tab-agi.active{background:rgba(80,180,80,.2);border-color:rgba(80,180,80,.5);color:#86efac}
.tab-int.active{background:rgba(80,130,220,.2);border-color:rgba(80,130,220,.5);color:#93c5fd}

/* ── Search ── */
.search-row{display:flex;gap:6px}
.search-row input{flex:1;padding:7px 11px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);border-radius:6px;color:#fff;font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.search-row input:focus{border-color:rgba(255,210,60,.6)}
.search-row input::placeholder{color:rgba(255,255,255,.3)}
.btn-clr{padding:7px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:6px;color:rgba(255,255,255,.6);font-size:11px;cursor:pointer;font-family:inherit}
.btn-clr:hover{background:rgba(255,255,255,.15)}

/* ── Hero grid ── */
.hero-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:6px;overflow-y:auto;max-height:220px;padding-right:2px}
.hero-grid::-webkit-scrollbar{width:3px}
.hero-grid::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}

.hcard{display:flex;flex-direction:column;align-items:center;padding:7px 3px 5px;border-radius:8px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);cursor:pointer;transition:all .15s;text-align:center;user-select:none;position:relative}
.hcard:hover:not(.used){background:rgba(255,255,255,.13);border-color:rgba(255,210,60,.5);transform:translateY(-1px)}
.hcard.selected{border-color:#fcd34d;background:rgba(255,210,60,.15);box-shadow:0 0 10px rgba(255,210,60,.25)}
.hcard.used{opacity:.25;pointer-events:none}
.hcard.over-budget{opacity:.45;border-color:rgba(248,113,113,.4)!important}

.hcard .htype{font-size:14px;margin-bottom:3px}
.hcard .hname{font-size:9px;color:rgba(255,255,255,.85);line-height:1.3;word-break:break-all}
.hcard .hscore{font-size:10px;font-weight:700;margin-top:2px}
.score-str{color:#fca5a5}
.score-agi{color:#86efac}
.score-int{color:#93c5fd}

/* ── Action buttons ── */
.action-row{display:flex;gap:6px}
.act-btn{flex:1;padding:10px;border:none;border-radius:7px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;letter-spacing:.5px}
.act-btn.pick{background:linear-gradient(135deg,#14532d,#16a34a);color:#fff}
.act-btn.pick:hover:not(:disabled){background:linear-gradient(135deg,#15803d,#22c55e)}
.act-btn:disabled{opacity:.28;cursor:not-allowed}

/* ── Overlays ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:linear-gradient(145deg,#1e0a4a,#2d1669);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:28px 32px;width:340px;text-align:center}
.modal h2{font-size:18px;font-weight:700;margin-bottom:5px;background:linear-gradient(90deg,#e8b4ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal p{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:18px}
.modal input{width:100%;padding:9px 11px;margin-bottom:8px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.18);border-radius:6px;color:#fff;font-size:12px;font-family:inherit;outline:none}
.modal input:focus{border-color:rgba(167,139,250,.6)}
.modal input::placeholder{color:rgba(255,255,255,.3)}
.mbtn{width:100%;padding:11px;margin-top:4px;background:linear-gradient(135deg,#5b21b6,#7c3aed);border:1px solid rgba(167,139,250,.3);border-radius:8px;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;letter-spacing:1px}
.mbtn:hover{background:linear-gradient(135deg,#6d28d9,#8b5cf6)}

.result-modal{background:linear-gradient(145deg,#1a0a3d,#2d1669);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:28px 36px;text-align:center;min-width:340px;max-width:500px}
.result-modal h2{font-size:20px;font-weight:700;color:#fcd34d;margin-bottom:18px;letter-spacing:2px}
.result-teams{display:flex;gap:28px;justify-content:center;margin-bottom:18px}
.rteam h3{font-size:12px;font-weight:700;margin-bottom:8px}
.rteam h3.a{color:#fca5a5}
.rteam h3.b{color:#93c5fd}
.rteam .rtotal{font-size:11px;margin-bottom:6px;color:rgba(255,255,255,.5)}
.rteam ul{list-style:none}
.rteam li{font-size:11px;color:rgba(255,255,255,.75);padding:2px 0;display:flex;justify-content:space-between;gap:12px}
.rteam li span{color:rgba(255,255,255,.4)}
.rbtn{padding:9px 24px;background:linear-gradient(135deg,#5b21b6,#7c3aed);border:1px solid rgba(167,139,250,.3);border-radius:8px;color:#fff;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px}
.rbtn:hover{background:linear-gradient(135deg,#6d28d9,#8b5cf6)}

/* ── BP order indicator ── */
.order-bar{display:flex;gap:3px;justify-content:center;flex-wrap:wrap}
.order-dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border:1.5px solid transparent;transition:all .2s}
.order-dot.a-dot{background:rgba(220,50,50,.25);color:#fca5a5;border-color:rgba(220,50,50,.4)}
.order-dot.b-dot{background:rgba(50,100,220,.25);color:#93c5fd;border-color:rgba(50,100,220,.4)}
.order-dot.done{opacity:.35}
.order-dot.current{transform:scale(1.25);box-shadow:0 0 8px rgba(255,210,60,.5);border-color:#fcd34d!important;color:#fcd34d!important}
</style>
</head>
<body>

<!-- Setup -->
<div class="overlay" id="setupOv">
  <div class="modal">
    <h2>⚔ JUMP大赛 BP系统</h2>
    <p>A队上限52分 · B队上限50分 · B队先手</p>
    <input id="inpA" placeholder="A队名称（默认：A队）"/>
    <input id="inpB" placeholder="B队名称（默认：B队）"/>
    <input id="inpCode" placeholder="对局代码（留空自动生成）"/>
    <button class="mbtn" onclick="startMatch()">开始对局</button>
  </div>
</div>

<!-- Result -->
<div class="overlay" id="resultOv" style="display:none">
  <div class="result-modal">
    <h2>🏆 对局结束</h2>
    <div class="result-teams" id="resultTeams"></div>
    <button class="rbtn" onclick="location.reload()">再来一局</button>
  </div>
</div>

<div class="header">
  <h1>JUMP大赛 · BP对战系统</h1>
  <div class="code" id="codeDisplay">对局代码: ------</div>
</div>

<div class="layout">
  <!-- A side -->
  <div class="side a-side" id="aSide">
    <div class="side-label a" id="aLabel">A队</div>
    <div class="score-total a" id="aScore">已用 0 / 52 分</div>
    <div class="sec-label">— 已选人物 —</div>
    <div class="pick-slot" id="aSlot1"><div class="av" style="background:rgba(220,50,50,.3)">1</div><div class="info"><div class="pname" id="aName1">等待选人</div><div class="pscore" id="aScore1">—</div></div></div>
    <div class="pick-slot" id="aSlot2"><div class="av" style="background:rgba(220,50,50,.3)">2</div><div class="info"><div class="pname" id="aName2">等待选人</div><div class="pscore" id="aScore2">—</div></div></div>
    <div class="pick-slot" id="aSlot3"><div class="av" style="background:rgba(220,50,50,.3)">3</div><div class="info"><div class="pname" id="aName3">等待选人</div><div class="pscore" id="aScore3">—</div></div></div>
    <div class="pick-slot" id="aSlot4"><div class="av" style="background:rgba(220,50,50,.3)">4</div><div class="info"><div class="pname" id="aName4">等待选人</div><div class="pscore" id="aScore4">—</div></div></div>
    <div class="pick-slot" id="aSlot5"><div class="av" style="background:rgba(220,50,50,.3)">5</div><div class="info"><div class="pname" id="aName5">等待选人</div><div class="pscore" id="aScore5">—</div></div></div>
  </div>

  <!-- Center -->
  <div class="center">
    <div class="info-bar">
      <span class="iname" id="curName">-</span>
      <span class="team-tag a" id="curTag">A队</span>
      <span style="font-size:11px;color:rgba(255,255,255,.4)" id="curRound">第1轮</span>
      <span style="font-size:11px;color:rgba(255,255,255,.4)" id="curLimit"></span>
    </div>

    <div class="order-bar" id="orderBar"></div>

    <div class="phase-row">
      <div class="phase-bar" id="phaseBar">选人阶段</div>
    </div>
    <div class="status-bar" id="statusBar">请选择英雄...</div>
    <div class="timer-bar" id="timerBar">60秒</div>

    <div class="tab-row">
      <button class="tab-btn tab-str active" id="tabStr" onclick="switchTab('str')">💪 力量</button>
      <button class="tab-btn tab-agi" id="tabAgi" onclick="switchTab('agi')">⚡ 敏捷</button>
      <button class="tab-btn tab-int" id="tabInt" onclick="switchTab('int')">🧠 智力</button>
      <button class="tab-btn" id="tabAll" onclick="switchTab('all')">全部</button>
    </div>

    <div class="search-row">
      <input id="searchInp" placeholder="搜索英雄..." oninput="renderGrid()"/>
      <button class="btn-clr" onclick="document.getElementById('searchInp').value='';renderGrid()">清除</button>
    </div>

    <div class="hero-grid" id="heroGrid"></div>

    <div class="action-row">
      <button class="act-btn pick" id="pickBtn" onclick="confirmPick()" disabled>✓ 选取英雄</button>
    </div>
  </div>

  <!-- B side -->
  <div class="side b-side" id="bSide">
    <div class="side-label b" id="bLabel">B队</div>
    <div class="score-total b" id="bScore">已用 0 / 50 分</div>
    <div class="sec-label">— 已选人物 —</div>
    <div class="pick-slot" id="bSlot1"><div class="av" style="background:rgba(50,100,220,.3)">1</div><div class="info"><div class="pname" id="bName1">等待选人</div><div class="pscore" id="bScore1">—</div></div></div>
    <div class="pick-slot" id="bSlot2"><div class="av" style="background:rgba(50,100,220,.3)">2</div><div class="info"><div class="pname" id="bName2">等待选人</div><div class="pscore" id="bScore2">—</div></div></div>
    <div class="pick-slot" id="bSlot3"><div class="av" style="background:rgba(50,100,220,.3)">3</div><div class="info"><div class="pname" id="bName3">等待选人</div><div class="pscore" id="bScore3">—</div></div></div>
    <div class="pick-slot" id="bSlot4"><div class="av" style="background:rgba(50,100,220,.3)">4</div><div class="info"><div class="pname" id="bName4">等待选人</div><div class="pscore" id="bScore4">—</div></div></div>
    <div class="pick-slot" id="bSlot5"><div class="av" style="background:rgba(50,100,220,.3)">5</div><div class="info"><div class="pname" id="bName5">等待选人</div><div class="pscore" id="bScore5">—</div></div></div>
  </div>
</div>

    {name:'阿比盖尔',score:10},{name:'西南风',score:8},{name:'五条悟',score:8},
    {name:'爱蜜莉雅',score:8},{name:'帕秋莉',score:8},{name:'小老师',score:8},
    {name:'未花Mika',score:8},{name:'蓝染惣右介',score:8},{name:'xcw（万圣节）',score:8},
    {name:'朽木白哉',score:6},{name:'xcw（原）',score:6},{name:'秽土宇智波鼬',score:6},
    {name:'白Sber',score:5},{name:'吉普莉亚',score:5},{name:'皮卡丘',score:5},
    {name:'慧慧',score:5},{name:'夜神月',score:5},{name:'天空龙',score:5},
    {name:'志度内',score:5}
  ]
};

// all heroes flat with type
const ALL_HEROES = [
  ...HEROES.str.map(h=>({...h,type:'str'})),
  ...HEROES.agi.map(h=>({...h,type:'agi'})),
  ...HEROES.int.map(h=>({...h,type:'int'})),
];

const TYPE_ICON = {str:'💪',agi:'⚡',int:'🧠'};
const TYPE_LABEL = {str:'力量',agi:'敏捷',int:'智力'};
const SCORE_CLASS = {str:'score-str',agi:'score-agi',int:'score-int'};
const BADGE_CLASS = {str:'badge-str',agi:'badge-agi',int:'badge-int'};

// BP order: B=blue=A队 A=red=B队 in game terms
// From rules: B→AA→B→A→BB→A→B→A  (B=B队, A=A队)
const PICK_ORDER = ['b','a','a','b','a','b','b','a','b','a'];
const LIMITS = {a:52, b:50};

let state = {
  aName:'A队', bName:'B队',
  aPicks:[], bPicks:[],
  aUsed:0, bUsed:0,
  selected:null,
  step:0,
  timer:60,
  timerInterval:null,
  tab:'str',
};

function genCode(){return Math.random().toString(16).substr(2,6).toUpperCase()}

function startMatch(){
  const a = document.getElementById('inpA').value.trim()||'A队';
  const b = document.getElementById('inpB').value.trim()||'B队';
  const c = document.getElementById('inpCode').value.trim()||genCode();
  state.aName=a; state.bName=b;
  document.getElementById('codeDisplay').textContent='对局代码: '+c;
  document.getElementById('aLabel').textContent=a;
  document.getElementById('bLabel').textContent=b;
  document.getElementById('setupOv').style.display='none';
  buildOrderBar();
  renderGrid();
  advanceTurn();
}

function buildOrderBar(){
  const bar = document.getElementById('orderBar');
  bar.innerHTML = PICK_ORDER.map((team,i)=>{
    const cls = team==='a'?'a-dot':'b-dot';
    const label = team==='a'? state.aName[0]: state.bName[0];
    return `<div class="order-dot ${cls}" id="dot${i}">${i+1}</div>`;
  }).join('');
}

function updateOrderBar(){
  PICK_ORDER.forEach((_,i)=>{
    const el = document.getElementById('dot'+i);
    if(!el) return;
    el.classList.remove('current','done');
    if(i < state.step) el.classList.add('done');
    else if(i === state.step) el.classList.add('current');
  });
}

function curTeam(){ return PICK_ORDER[state.step]; }

function advanceTurn(){
  if(state.step >= 10){ endMatch(); return; }
  const team = curTeam();
  const tName = team==='a'? state.aName: state.bName;
  const limit = LIMITS[team];
  const used = team==='a'? state.aUsed: state.bUsed;
  const remaining = limit - used;

  document.getElementById('curName').textContent = tName;
  document.getElementById('curTag').textContent = tName;
  document.getElementById('curTag').className = 'team-tag '+(team==='a'?'a':'b');
  document.getElementById('curRound').textContent = '第'+(state.step+1)+'轮';
  document.getElementById('curLimit').textContent = '剩余分数: '+remaining;
  document.getElementById('phaseBar').textContent = '选人阶段 — 第'+(state.step+1)+'轮';
  document.getElementById('statusBar').textContent = tName + ' 正在选择英雄...';

  state.selected = null;
  document.getElementById('pickBtn').disabled = true;

  // highlight active slot
  document.querySelectorAll('.pick-slot').forEach(el=>el.classList.remove('active'));
  const picks = team==='a'? state.aPicks: state.bPicks;
  const slotIdx = picks.length + 1;
  const slotEl = document.getElementById(team+'Slot'+slotIdx);
  if(slotEl) slotEl.classList.add('active');

  updateOrderBar();
  renderGrid();
  startTimer();
}

function getUsed(hero){
  return [...state.aPicks,...state.bPicks].some(p=>p.name===hero.name);
}

function renderGrid(){
  const tab = state.tab;
  const q = document.getElementById('searchInp').value.trim().toLowerCase();
  const team = state.step < 10 ? curTeam() : 'a';
  const used = team==='a'? state.aUsed: state.bUsed;
  const limit = LIMITS[team];
  const remaining = limit - used;

  let heroes;
  if(tab==='all') heroes = ALL_HEROES;
  else heroes = HEROES[tab].map(h=>({...h,type:tab}));

  if(q) heroes = heroes.filter(h=>h.name.toLowerCase().includes(q)||h.score.toString().includes(q));

  document.getElementById('heroGrid').innerHTML = heroes.map(h=>{
    const isUsed = getUsed(h);
    const isOver = !isUsed && h.score > remaining;
    const isSel = state.selected && state.selected.name===h.name;
    let cls = 'hcard';
    if(isUsed) cls+=' used';
    else if(isOver) cls+=' over-budget';
    if(isSel) cls+=' selected';
    return `<div class="${cls}" onclick="selectHero('${h.name}','${h.type}',${h.score})">
      <div class="htype">${TYPE_ICON[h.type]}</div>
      <div class="hname">${h.name}</div>
      <div class="hscore ${SCORE_CLASS[h.type]}">${h.score}分</div>
    </div>`;
  }).join('');
}

function selectHero(name,type,score){
  const team = curTeam();
  const used = team==='a'? state.aUsed: state.bUsed;
  const limit = LIMITS[team];
  if(used+score > limit) return;
  if(getUsed({name})) return;
  state.selected = {name,type,score};
  document.getElementById('pickBtn').disabled = false;
  renderGrid();
}

function switchTab(t){
  state.tab = t;
  ['str','agi','int','all'].forEach(x=>{
    const el = document.getElementById('tab'+x.charAt(0).toUpperCase()+x.slice(1));
    if(el) el.classList.toggle('active', x===t);
  });
  renderGrid();
}

function confirmPick(){
  if(!state.selected) return;
  const team = curTeam();
  const hero = state.selected;
  state.selected = null;
  stopTimer();

  if(team==='a'){
    state.aPicks.push(hero);
    state.aUsed += hero.score;
  } else {
    state.bPicks.push(hero);
    state.bUsed += hero.score;
  }

  // update side panel
  const picks = team==='a'? state.aPicks: state.bPicks;
  const idx = picks.length;
  const slotEl = document.getElementById(team+'Slot'+idx);
  if(slotEl){
    slotEl.classList.remove('active');
    slotEl.classList.add('filled');
    slotEl.querySelector('.pname').textContent = hero.name;
    slotEl.querySelector('.pscore').textContent = TYPE_ICON[hero.type]+' '+TYPE_LABEL[hero.type]+' · '+hero.score+'分';
    slotEl.querySelector('.av').textContent = TYPE_ICON[hero.type];
  }

  // update score display
  updateScoreDisplay();

  state.step++;
  document.getElementById('pickBtn').disabled = true;
  setTimeout(advanceTurn, 300);
}

function updateScoreDisplay(){
  const aEl = document.getElementById('aScore');
  aEl.textContent = '已用 '+state.aUsed+' / 52 分';
  aEl.className = 'score-total a'+(state.aUsed>52?' score-over':'');

  const bEl = document.getElementById('bScore');
  bEl.textContent = '已用 '+state.bUsed+' / 50 分';
  bEl.className = 'score-total b'+(state.bUsed>50?' score-over':'');
}

function startTimer(){
  stopTimer();
  state.timer=60;
  updateTimerDisplay();
  state.timerInterval=setInterval(()=>{
    state.timer--;
    updateTimerDisplay();
    if(state.timer<=0){stopTimer();autoSkip();}
  },1000);
}
function stopTimer(){
  if(state.timerInterval){clearInterval(state.timerInterval);state.timerInterval=null;}
}
function updateTimerDisplay(){
  const el=document.getElementById('timerBar');
  el.textContent=state.timer+'秒';
  el.className='timer-bar'+(state.timer<=15?' urgent':'');
}

function autoSkip(){
  const team=curTeam();
  const used=team==='a'?state.aUsed:state.bUsed;
  const limit=LIMITS[team];
  const remaining=limit-used;
  const avail=ALL_HEROES.filter(h=>!getUsed(h)&&h.score<=remaining);
  if(!avail.length){state.step++;setTimeout(advanceTurn,300);return;}
  const pick=avail[Math.floor(Math.random()*avail.length)];
  state.selected=pick;
  confirmPick();
}

function endMatch(){
  stopTimer();
  const fmt = picks => picks.map(h=>`<li>${TYPE_ICON[h.type]} ${h.name}<span>${h.score}分</span></li>`).join('');
  document.getElementById('resultTeams').innerHTML=`
    <div class="rteam">
      <h3 class="a">${state.aName}</h3>
      <div class="rtotal">总分: ${state.aUsed} / 52</div>
      <ul>${fmt(state.aPicks)}</ul>
    </div>
    <div class="rteam">
      <h3 class="b">${state.bName}</h3>
      <div class="rtotal">总分: ${state.bUsed} / 50</div>
      <ul>${fmt(state.bPicks)}</ul>
    </div>`;
  document.getElementById('resultOv').style.display='flex';
}
</script>
</body>
</html>
