// ---------- 核心修复：换边逻辑 ----------
// 原来的问题：只改了 swapped 标志，但没有真正交换两队的数据和分数上限
// 修复方案：换边时直接交换 a/b 的所有数据（队名、已选英雄、已用分数），同时交换分数上限
// 这样界面和顺序会完全对换，符合真实“换边”

function swapTeams() {
  if (!ref) return;
  // 获取当前状态
  const newA = {
    name: gs.bName,
    picks: [...(gs.bPicks || [])],
    used: gs.bUsed || 0
  };
  const newB = {
    name: gs.aName,
    picks: [...(gs.aPicks || [])],
    used: gs.aUsed || 0
  };
  // 交换分数上限 (A队原52 ↔ B队原50)
  // 注意：上限不直接存在gs里，但通过 getLIM() 动态计算，这里需要同步 swapped 标志
  // 同时为了数据一致性，把历史记录里的队伍归属也交换（否则回放会乱）
  const swappedHistory = (gs.allRounds || []).map(round => ({
    roundNum: round.roundNum,
    aPicks: round.bPicks,
    bPicks: round.aPicks,
    aUsed: round.bUsed,
    bUsed: round.aUsed
  }));
  
  ref.update({
    aName: newA.name,
    bName: newB.name,
    aPicks: newA.picks,
    bPicks: newB.picks,
    aUsed: newA.used,
    bUsed: newB.used,
    swapped: !(gs.swapped || false),   // 交换先手顺序
    allRounds: swappedHistory,
    ts: Date.now()
  });
}

// 将原来的 refAction 里的 'swap' 调用这个函数
function refAction(type) {
  if (!ref) return;
  if (type === 'swap') {
    swapTeams();
    return;
  }
  // 其他 start/pause/skip/endAll 保持不变
  if (type === 'start') {
    const newRound = (gs.roundNum || 0) + 1;
    ref.update({
      aPicks: [], bPicks: [], aUsed: 0, bUsed: 0,
      step: 0, active: true, paused: false, roundEnded: false,
      roundNum: newRound, ts: Date.now()
    });
  } else if (type === 'pause') {
    ref.update({ paused: !gs.paused, ts: Date.now() });
  } else if (type === 'skip') {
    if (!gs.active || gs.roundEnded || gs.ended) return;
    const ns = gs.step + 1;
    if (ns >= 10) endRound();
    else ref.update({ step: ns, ts: Date.now() });
  } else if (type === 'endAll') {
    ref.update({ ended: true, active: false, ts: Date.now() });
  }
}

// 其余函数（canPick, myTurn, doPick, syncUI, renderGrid 等）保持不变
// 但需要注意：分数上限 getLIM 现在依赖 gs.swapped，换边后会自动正确
function getLIM() {
  return gs.swapped ? { a: 50, b: 52 } : { a: 52, b: 50 };
}
function ct() {
  const order = gs.swapped ? ['a','b','b','a','b','a','a','b','a','b'] : ['b','a','a','b','a','b','b','a','b','a'];
  return order[gs.step] || 'a';
}
// 其他函数（globalUsed, canPick, doPick, endRound, syncUI, showResult 等）保持你原来的实现，无需改动

// 确保在 syncUI 里正确显示队伍名称和分数（用交换后的值）
function syncUI() {
  // 显示队名和分数时直接用 gs.aName, gs.bName
  document.getElementById('aLabel').textContent = gs.aName;
  document.getElementById('bLabel').textContent = gs.bName;
  const aUsed = gs.aUsed || 0;
  const bUsed = gs.bUsed || 0;
  const aMax = getLIM().a;
  const bMax = getLIM().b;
  document.getElementById('aScore').textContent = `已用 ${aUsed} / ${aMax} 分`;
  document.getElementById('bScore').textContent = `已用 ${bUsed} / ${bMax} 分`;
  // 其他 UI 更新（槽位、历史、轮次指示器）保持原样
  // ...
}
